# fly.toml app configuration file generated for stock-predictor on 2026-06-03T19:29:24-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stock-predictor'
primary_region = 'ord'

[build]
  dockerfile = "Dockerfile.fly"

[env]
  STOCKPRED_DB = "/data/app.db"
  STOCKPRED_CORS = "*"        # tighten in production

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"  # save money when idle
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "stockpred_data"
  destination = "/data"

[checks.healthz]
  type = "http"
  port = 8000
  path = "/healthz"
  interval = "30s"
  timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
